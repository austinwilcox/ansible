- name: Install QMK dependencies
  become: true
  ansible.builtin.apt:
    name:
      - gcc-avr
      - avr-libc
      - dfu-programmer
      - dfu-util
      - git
      - unzip
      - python3-pip
      - python3.12-venv
    state: present
  when: ansible_system == "Linux" and ansible_pkg_mgr == "apt"
  tags: qmk

- name: Clone QMK firmware
  ansible.builtin.git:
    repo: "git@github.com:austinwilcox/qmk_firmware"
    dest: "{{ home_dir }}/Software/qmk_firmware"
    version: master
  tags: qmk

- name: Install QMK CLI
  ansible.builtin.command: python3 -m pip install --user qmk
  args:
    creates: "{{ home_dir }}/.local/bin/qmk"
  tags: qmk

- name: Run QMK setup
  ansible.builtin.command: "{{ home_dir }}/.local/bin/qmk setup"
  changed_when: false
  tags: qmk
