- name: Ensure uinput module loads on boot
  become: true
  ansible.builtin.copy:
    content: "uinput\n"
    dest: /etc/modules-load.d/uinput.conf
    mode: "0644"
  when: ansible_system == "Linux"
  tags: kmonad

- name: Load uinput module now
  become: true
  community.general.modprobe:
    name: uinput
    state: present
  when: ansible_system == "Linux"
  tags: kmonad

- name: Add user to input group (for /dev/uinput access)
  become: true
  ansible.builtin.user:
    name: "{{ user }}"
    groups: input
    append: true
  when: ansible_system == "Linux"
  tags: kmonad

- name: Create udev rule for kmonad uinput access
  become: true
  ansible.builtin.copy:
    content: 'KERNEL=="uinput", MODE="0660", GROUP="input", OPTIONS+="static_node=uinput"'
    dest: /etc/udev/rules.d/90-kmonad.rules
    mode: "0644"
  notify: reload udev
  when: ansible_system == "Linux"
  tags: kmonad

- name: Stow kmonad files from dotfiles
  ansible.builtin.command: stow kmonad
  args:
    chdir: "{{ home_dir }}/.dotfiles"
  changed_when: false
  when: ansible_system == "Linux"
  tags: kmonad

- name: Add kmonad to crontab for reboot
  become: true
  ansible.builtin.lineinfile:
    path: /etc/crontab
    line: "@reboot root {{ home_dir }}/kmonad/kmonad {{ home_dir }}/kmonad/kmonad-layouts/colemak-dh-extend-ansi.kbd"
    state: present
  when: ansible_system == "Linux"
  tags: kmonad
