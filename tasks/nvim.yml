- name: Check installed neovim version
  ansible.builtin.shell: nvim --version | head -1
  register: nvim_installed
  changed_when: false
  failed_when: false
  tags: neovim

- name: Install neovim build dependencies
  become: true
  ansible.builtin.apt:
    name:
      - make
      - cmake
      - autoconf
      - automake
      - g++
      - libtool
      - libtool-bin
      - ninja-build
      - pkg-config
      - unzip
      - gettext
    state: present
  when: ansible_system == "Linux" and ansible_pkg_mgr == "apt"
  tags: neovim

- name: Clone Neovim
  ansible.builtin.git:
    repo: "https://github.com/neovim/neovim.git"
    dest: "{{ home_dir }}/neovim"
    version: "{{ neovim_version }}"
    force: true
  register: nvim_clone
  tags: neovim

- name: Build neovim
  ansible.builtin.command: make CMAKE_BUILD_TYPE=RelWithDebInfo
  args:
    chdir: "{{ home_dir }}/neovim"
  when: nvim_clone.changed or nvim_installed.rc != 0
  tags: neovim

- name: Install neovim
  become: true
  ansible.builtin.command: make install
  args:
    chdir: "{{ home_dir }}/neovim"
  when: nvim_clone.changed or nvim_installed.rc != 0
  tags: neovim

- name: Install neovim plugins via lazy.nvim
  ansible.builtin.command: nvim --headless "+Lazy! sync" +qa
  environment:
    HOME: "{{ home_dir }}"
  changed_when: false
  tags: neovim

- name: Install treesitter parsers
  ansible.builtin.command: nvim --headless "+TSUpdateSync" +qa
  environment:
    HOME: "{{ home_dir }}"
  changed_when: false
  tags: neovim
