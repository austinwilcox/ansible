- name: Check if dotfiles already exist
  ansible.builtin.stat:
    path: "{{ home_dir }}/.dotfiles"
  register: dotfiles
  tags: dotfiles

- name: Check if bashrc already exists
  ansible.builtin.stat:
    path: "{{ home_dir }}/.bashrc"
  register: bashrc
  tags: dotfiles

- name: Clone dotfiles if they do not exist
  ansible.builtin.git:
    repo: "git@github.com:austinwilcox/dotfiles.git"
    dest: "{{ home_dir }}/.dotfiles"
    version: master
  when: not dotfiles.stat.exists
  tags: dotfiles

- name: Remove bashrc if it exists (stow will replace it)
  ansible.builtin.file:
    path: "{{ home_dir }}/.bashrc"
    state: absent
  when: bashrc.stat.exists
  tags: dotfiles

- name: Stow dotfiles
  ansible.builtin.command: stow .
  args:
    chdir: "{{ home_dir }}/.dotfiles"
  changed_when: false
  tags: dotfiles

- name: Stow Obsidian Vimrc
  ansible.builtin.command: stow Zettelkasten-V2 -t {{ home_dir }}/Zettelkasten-V2
  args:
    chdir: "{{ home_dir }}/.dotfiles"
  changed_when: false
  tags:
    - dotfiles
    - zettelkasten

- name: Check if eza is installed
  ansible.builtin.shell: command -v eza
  register: eza_exists
  changed_when: false
  failed_when: false
  tags: dotfiles

- name: Install eza
  ansible.builtin.command: "{{ home_dir }}/.cargo/bin/cargo install eza"
  when: eza_exists.rc != 0
  tags: dotfiles

- name: Check if alacritty is installed
  ansible.builtin.shell: command -v alacritty
  register: alacritty_exists
  changed_when: false
  failed_when: false
  tags: dotfiles

- name: Clone Alacritty
  ansible.builtin.git:
    repo: "https://github.com/alacritty/alacritty.git"
    dest: "{{ home_dir }}/alacritty"
    version: master
  when: alacritty_exists.rc != 0
  tags: dotfiles

- name: Build and install Alacritty
  ansible.builtin.shell: |
    cargo build --release
    sudo cp target/release/alacritty /usr/local/bin
    sudo cp extra/logo/alacritty-term.svg /usr/share/pixmaps/Alacritty.svg
    sudo desktop-file-install extra/linux/Alacritty.desktop
    sudo update-desktop-database
  args:
    chdir: "{{ home_dir }}/alacritty"
    creates: /usr/local/bin/alacritty
  when: alacritty_exists.rc != 0
  tags: dotfiles

- name: Clone Nerd Fonts
  ansible.builtin.git:
    repo: "https://github.com/ryanoasis/nerd-fonts.git"
    depth: 1
    dest: "{{ home_dir }}/nerd-fonts"
    version: master
  tags: dotfiles

- name: Install UbuntuMono Nerd Font
  ansible.builtin.command: ./install.sh UbuntuMono
  args:
    chdir: "{{ home_dir }}/nerd-fonts"
    creates: "{{ home_dir }}/.local/share/fonts/UbuntuMonoNerdFont-Regular.ttf"
  tags: dotfiles
